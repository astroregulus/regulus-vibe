backend:
  name: git-gateway
  branch: master

media_folder: public/images
public_folder: /images

# Locale for the CMS editor UI
locale: pt

collections:
  - name: courses
    label: Cursos de Especialização
    label_singular: Curso
    description: Cursos de extensão e especialização oferecidos pela Escola Regulus.
    files:
      - name: courses_list
        label: Lista de Cursos
        file: src/data/courses.json
        fields:
          - name: courses
            label: Cursos
            label_singular: Curso
            widget: list
            fields:
              - name: title
                label: Título
                widget: string
                hint: Nome do curso de especialização.
              - name: description
                label: Descrição
                widget: text
                hint: Breve descrição do conteúdo do curso.
              - name: level
                label: Nível
                widget: select
                options:
                  - label: Básico
                    value: Básico
                  - label: Intermediário
                    value: Intermediário
                  - label: Avançado
                    value: Avançado
              - name: duration
                label: Duração
                widget: string
                hint: Ex. "6 meses", "4 meses".
              - name: topics
                label: Conteúdo Programático
                label_singular: Tópico
                widget: list
                field:
                  name: item
                  label: Tópico
                  widget: string
                hint: Lista de tópicos exibidos no painel "Saiba Mais".
              - name: turmas
                label: Próximas Turmas
                label_singular: Turma
                widget: list
                fields:
                  - name: startDate
                    label: Data de Início
                    widget: string
                    hint: 'Ex: "Abril 2025", "Março 2025 — turma vespertina".'
                  - name: time
                    label: Horário
                    widget: string
                    hint: 'Ex: "19h às 21h", "10h às 12h".'
                  - name: instructorId
                    label: Professor
                    widget: relation
                    collection: instructors
                    file: instructors_list
                    search_fields: ["instructors.*.nome"]
                    display_fields: ["instructors.*.nome"]
                    value_field: "instructors.*.id"
                    hint: Selecione o professor responsável por esta turma.

  - name: instructors
    label: Professores
    label_singular: Professor
    description: Corpo docente ativo da Escola Regulus de Astrologia.
    files:
      - name: instructors_list
        label: Lista de Professores
        file: src/data/instructors.json
        fields:
          - name: instructors
            label: Professores
            label_singular: Professor
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
                hint: >
                  Identificador único em minúsculas sem acentos, separado por hífens.
                  Ex: "regina-atena". Não alterar após a criação.
                pattern:
                  - "^[a-z0-9]+(-[a-z0-9]+)*$"
                  - Deve conter apenas letras minúsculas, números e hífens.
              - name: nome
                label: Nome
                widget: string
              - name: iniciais
                label: Iniciais
                widget: string
                hint: Duas letras exibidas no avatar. Ex. "RA".
                pattern:
                  - "^[A-Z]{2}$"
                  - Deve conter exatamente 2 letras maiúsculas.
              - name: especialidade
                label: Especialidade
                widget: string
                hint: Área de especialização do professor.
              - name: bio
                label: Biografia
                widget: text
                hint: Breve apresentação profissional do professor.
