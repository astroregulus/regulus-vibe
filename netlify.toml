# Netlify Configuration for Regulus Astrology School Website
# Documentation: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command to generate static site
  command = "npm run build"
  
  # Directory to publish (Astro output folder)
  publish = "dist"
  
[build.environment]
  # Build environment variables
  NODE_VERSION = "22.12.0"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"


